# Nexus upload for the VR variant. Only the VR build is posted from this fork (the
# SE/AE variants are upstream's territory). Uses the OFFICIAL Nexus-Mods/upload-action
# reusable workflow (alandtse/nexus-workflows/.github/workflows/upload-nexus-official.yml)
# rather than the session-cookie one, because posting into an existing file group
# requires a file_group_id, which only the official API exposes.
#
# The file_group_id (3012121) was minted by uploading the VR file once manually on
# the Nexus website (Files tab -> "API Info", or the Manage Files edit menu) and is
# reused for every subsequent version so updates land in the same file slot.
#
# The official API can't set the Nexus changelog tab, so a second, best-effort job
# (upload-changelog) updates it afterward via the session-cookie uploader
# (upload-nexus.yml) with check_existing=true, which skips re-uploading the file
# (already there from the official step) and just sets the changelog text.
#
# Safety: dry_run defaults to true (report only, never uploads). A real upload needs
# repo secrets UNEX_APIKEY and UNEX_NEXUSMODS_SESSION_COOKIE configured — then
# dispatch with dry_run=false (release.yaml flips it via the NEXUS_AUTO_UPLOAD repo
# variable).
#
# Nexus page: https://www.nexusmods.com/skyrimspecialedition/mods/59816
name: "Nexus: Upload VR Release"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Published stable release tag to upload (vX.Y.Z)."
        required: true
      nexus_mod_id:
        description: "Dialogue Movement Enabler VR Nexus mod ID."
        required: false
        default: "59816"
      file_group_id:
        description: "Nexus file group ID to upload this version into."
        required: false
        default: "3012121"
      mod_filename:
        description: "Nexus file display name."
        required: false
        default: "Dialogue Movement Enabler VR"
      dry_run:
        description: "If true, only report the planned upload; never upload."
        required: false
        type: choice
        default: "true"
        options: ["true", "false"]
      changelog:
        description: "Optional changelog; defaults to the GitHub release body."
        required: false
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      nexus_mod_id:
        required: false
        type: string
        default: "59816"
      file_group_id:
        required: false
        type: string
        default: "3012121"
      mod_filename:
        required: false
        type: string
        default: "Dialogue Movement Enabler VR"
      dry_run:
        required: false
        type: string
        default: "true"
      changelog:
        required: false
        type: string
        default: ""
    secrets:
      UNEX_APIKEY:
        required: false
      UNEX_NEXUSMODS_SESSION_COOKIE:
        required: false

# Read-only on GitHub: jobs list/download the release and write only to Nexus.
permissions:
  contents: read

jobs:
  prepare:
    name: Resolve release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      dry_run: ${{ steps.resolve.outputs.dry_run }}
      changelog: ${{ steps.body.outputs.changelog }}
    steps:
      - name: Resolve and validate tag
        id: resolve
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="$INPUT_TAG"
          [ -n "$TAG" ] || { echo "::error::No tag provided." >&2; exit 1; }
          # Nexus only gets stable releases.
          if [[ "$TAG" == *-* ]]; then
            echo "::error::'$TAG' is a pre-release tag; only stable releases go to Nexus." >&2
            exit 1
          fi
          DRAFT=$(gh api "repos/$GITHUB_REPOSITORY/releases" \
            --jq ".[] | select(.tag_name == \"$TAG\") | .draft" 2>/dev/null | head -1)
          if [ "$DRAFT" != "false" ]; then
            echo "::error::Release '$TAG' is not published. Publish the GitHub release first." >&2
            exit 1
          fi
          DRY_RUN=$([ "$INPUT_DRY_RUN" = "false" ] && echo false || echo true)
          {
            echo "tag=$TAG"
            echo "version=${TAG#v}"
            echo "dry_run=$DRY_RUN"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve changelog (release body)
        id: body
        env:
          INPUT_CHANGELOG: ${{ inputs.changelog }}
          TAG: ${{ steps.resolve.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DELIM="EOF_$(openssl rand -hex 8)"
          {
            echo "changelog<<$DELIM"
            if [ -n "$INPUT_CHANGELOG" ]; then
              printf '%s\n' "$INPUT_CHANGELOG"
            else
              gh api "repos/$GITHUB_REPOSITORY/releases/tags/$TAG" --jq '.body // ""' 2>/dev/null || true
            fi
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

  dry-run-check:
    name: Dry run — check Nexus versions
    needs: prepare
    if: needs.prepare.outputs.dry_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Query Nexus for existing versions
        env:
          MOD_ID: ${{ inputs.nexus_mod_id || '59816' }}
          VERSION: ${{ needs.prepare.outputs.version }}
          MOD_FILENAME: ${{ inputs.mod_filename || 'Dialogue Movement Enabler VR' }}
          UNEX_APIKEY: ${{ secrets.UNEX_APIKEY }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error

          mod_id = os.environ.get('MOD_ID', '')
          version = os.environ.get('VERSION', '')
          game_id = 'skyrimspecialedition'
          api_key = os.environ.get('UNEX_APIKEY', '')
          label = os.environ.get('MOD_FILENAME', 'Dialogue Movement Enabler VR')
          summary = open(os.environ['GITHUB_STEP_SUMMARY'], 'a')

          def w(line=''):
              print(line)
              summary.write(line + '\n')

          w('## Dry Run — Nexus Version Check')
          w()
          if not api_key:
              w('> **Warning:** UNEX_APIKEY is not set — cannot query Nexus.')

          url = f'https://www.nexusmods.com/{game_id}/mods/{mod_id}'
          link = f'[{label}]({url})'
          w('| Mod | Planned | Status | Versions on Nexus |')
          w('|-----|---------|--------|-------------------|')
          if not api_key:
              w(f'| {link} | `{version}` | ⚠️ skipped | — |')
              summary.close()
              raise SystemExit(0)

          api_url = f'https://api.nexusmods.com/v1/games/{game_id}/mods/{mod_id}/files.json'
          req = urllib.request.Request(api_url, headers={
              'apikey': api_key,
              'User-Agent': 'dialoguemovementenabler-vr-ci/1.0',
              'Accept': 'application/json',
          })
          try:
              with urllib.request.urlopen(req, timeout=15) as resp:
                  files = json.load(resp).get('files', [])
              main = [f for f in files if f.get('category_name') == 'MAIN']
              check = main if main else files
              seen = []
              for f in check:
                  v = f.get('version', '')
                  if v and v not in seen:
                      seen.append(v)
              versions_str = ', '.join(f'`{v}`' for v in seen[-5:]) or '—'
              status = '✅ exists (would skip)' if version in seen else '🆕 new'
              w(f'| {link} | `{version}` | {status} | {versions_str} |')
              w()
              w('> ✓ UNEX_APIKEY validated.')
          except urllib.error.HTTPError as e:
              err = {401: '❌ auth failed', 403: '❌ forbidden'}.get(e.code, f'❌ HTTP {e.code}')
              w(f'| {link} | `{version}` | {err} | — |')
          except Exception:
              w(f'| {link} | `{version}` | ❌ error | — |')
          summary.close()
          PYEOF

  upload:
    name: Upload to Nexus
    needs: prepare
    if: needs.prepare.outputs.dry_run != 'true'
    uses: alandtse/nexus-workflows/.github/workflows/upload-nexus-official.yml@main
    with:
      file_group_id: ${{ inputs.file_group_id || '3012121' }}
      version: ${{ needs.prepare.outputs.version }}
      tag_name: ${{ needs.prepare.outputs.tag }}
      artifact_pattern: "DialogueMovementEnablerVR-*.7z"
      file_category: main
      display_name: ${{ inputs.mod_filename || 'Dialogue Movement Enabler VR' }}
      description: "See Description → Requirements for installation instructions. PDB is for crash debugging and can be removed."
      archive_existing_file: true
      check_existing: true
      nexus_mod_id: ${{ inputs.nexus_mod_id || '59816' }}
      nexus_game_id: skyrimspecialedition
    secrets:
      UNEX_APIKEY: ${{ secrets.UNEX_APIKEY }}

  # Best-effort: update the Nexus mod changelog tab via the session-cookie uploader AFTER
  # the official file upload. check_existing finds the file the official step just
  # uploaded and skips re-uploading it, but still sets the changelog. BUTR treats a
  # changelog failure as a warning (not a job failure), so a stale cookie never blocks
  # the release -- only the changelog update is missed (re-run to retry).
  upload-changelog:
    name: Update Nexus changelog
    needs: [prepare, upload]
    if: needs.prepare.outputs.dry_run != 'true'
    uses: alandtse/nexus-workflows/.github/workflows/upload-nexus.yml@main
    with:
      nexus_game_id: skyrimspecialedition
      nexus_mod_id: ${{ inputs.nexus_mod_id || '59816' }}
      tag_name: ${{ needs.prepare.outputs.tag }}
      mod_version: ${{ needs.prepare.outputs.version }}
      mod_filename: ${{ inputs.mod_filename || 'Dialogue Movement Enabler VR' }}
      changelog: ${{ needs.prepare.outputs.changelog }}
      check_existing: true
    secrets:
      UNEX_NEXUSMODS_SESSION_COOKIE: ${{ secrets.UNEX_NEXUSMODS_SESSION_COOKIE }}
      UNEX_APIKEY: ${{ secrets.UNEX_APIKEY }}
